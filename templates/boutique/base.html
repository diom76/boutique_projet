<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} Boutique {% endblock  %} Boutique </title>
    <link  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"  rel="stylesheet">
    <style>
        body {font-family:Arial; max-width:900px; margin:auto; padding: 20px;}
        nav{background:#333; padding:10px; margin-bottom:20px;}
        nav a{color:#155724; text-decoration: none; margin-right:15px;}
        .produit-card{border:1px solid#ddd; padding:15px; margin:10px 0; border-raduis:8px;}
        .prix{color:green; font-size: 1.3em; font-weight:bold;}
        .stock{color:gray; font-size;0,9em;}
        .btn{background:#333; color:white; padding:8px 16px; text-decoration:non; border-raduis:4px}
        
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            
            <div class="navbar-nav ms-auto flex-row gap-2">
                <a href="{% url 'boutique:liste' %}" class="btn btn-outline-light">
                    Produits
                </a>
                <a href="{% url 'boutique:contact' %}" class="btn btn-outline-light">
                    Contact
                </a>
                <a href="{% url 'boutique:admin_dashboard' %}" class="btn btn-outline-warning">
                    Dashboard
                </a>
                
                {% if user.is_authenticated %}
                <a href="{% url 'boutique:profil' %}" class="btn btn-outline-light">
                    {{user.username}}
                </a>
                
                <form method="post" action="{% url 'logout' %}" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-danger">
                        Déconnexion
                    </button>
                </form>
                {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-light">
                    Connexion
                </a>
                    
                {% endif %}
                    
                <a href="/admin/" class="btn btn-outline-warning">
                    Admin
                </a>
            </div>
        </div>
    </nav>
    <div class="container">
        
        {% if messages %}
        {% for message in messages  %}
        <div class="alert alert-success alert-dismissible fade show">
            
            {{message}}
            <button type="button" class="btn btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}
        {% block content %}
        {% endblock  %}
    </div>
    <footer class="text-center text-muted py-4 mt-5">
        <br>
        <p>2026 Ma boutque</p>
    </footer>
    <script src="https://cd.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
